<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Cart | Panda Print Magnets</title>

  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/chatbot.css" />

  <style>
    .cart-page {
      width: min(1180px, calc(100% - 40px));
      margin: 0 auto;
      padding: 90px 0;
    }

    .cart-hero {
      text-align: center;
      margin-bottom: 48px;
    }

    .cart-hero h1 {
      margin: 0 0 14px;
      font-size: clamp(3rem, 6vw, 5rem);
      line-height: 0.95;
      letter-spacing: -0.05em;
    }

    .cart-hero p {
      color: #cbd5e1;
      font-weight: 700;
    }

    .cart-layout {
      display: grid;
      grid-template-columns: 1.2fr 0.8fr;
      gap: 28px;
      align-items: start;
    }

    .cart-card,
    .cart-summary,
    .empty-cart {
      padding: 30px;
      border-radius: 32px;
      background: rgba(10, 18, 35, 0.66);
      border: 1px solid rgba(255, 255, 255, 0.16);
      backdrop-filter: blur(24px);
      box-shadow: 0 28px 70px rgba(0, 0, 0, 0.34);
    }

    .cart-list {
      display: grid;
      gap: 20px;
    }

    .cart-item {
      display: grid;
      grid-template-columns: 130px 1fr auto;
      gap: 20px;
      align-items: center;
    }

    .cart-item img {
      width: 130px;
      height: 100px;
      object-fit: cover;
      border-radius: 20px;
    }

    .cart-item h2 {
      margin: 0 0 6px;
      color: white;
    }

    .cart-item p {
      margin: 0 0 12px;
      color: #cbd5e1;
      font-weight: 650;
    }

    .qty-controls {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .qty-controls button {
      width: 34px;
      height: 34px;
      border: 0;
      border-radius: 50%;
      background: white;
      color: #0f172a;
      font-size: 20px;
      font-weight: 900;
      cursor: pointer;
    }

    .qty-controls span {
      color: white;
      font-weight: 900;
    }

    .cart-price {
      color: #67e8f9;
      font-size: 1.3rem;
      font-weight: 900;
      text-align: right;
    }

    .remove-btn {
      margin-top: 14px;
      padding: 10px 16px;
      border: 0;
      border-radius: 999px;
      color: white;
      cursor: pointer;
      background: rgba(239, 68, 68, 0.8);
      font-weight: 800;
    }

    .cart-summary h2 {
      margin: 0 0 20px;
    }

    .summary-row {
      display: flex;
      justify-content: space-between;
      gap: 15px;
      padding: 14px 0;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      color: #cbd5e1;
      font-weight: 700;
    }

    .summary-total {
      display: flex;
      justify-content: space-between;
      margin: 22px 0;
      color: white;
      font-size: 1.4rem;
      font-weight: 900;
    }

    .cart-summary .btn {
      width: 100%;
      margin-bottom: 14px;
      text-align: center;
    }

    .empty-cart {
      text-align: center;
      grid-column: 1 / -1;
    }

    .empty-cart h2 {
      margin: 0 0 12px;
      font-size: 2rem;
    }

    .empty-cart p {
      color: #cbd5e1;
      margin-bottom: 24px;
    }

    @media (max-width: 900px) {
      .cart-layout {
        grid-template-columns: 1fr;
      }

      .cart-item {
        grid-template-columns: 1fr;
        text-align: center;
      }

      .cart-item img {
        width: 100%;
        height: auto;
        aspect-ratio: 4 / 3;
      }

      .cart-price {
        text-align: center;
      }

      .qty-controls {
        justify-content: center;
      }
    }

    @media (max-width: 680px) {
      .cart-page {
        width: min(100% - 26px, 1180px);
        padding: 60px 0;
      }

      .cart-card,
      .cart-summary,
      .empty-cart {
        padding: 24px 18px;
      }
    }
  </style>
</head>

<body class="page-cart">
  <div id="site-header"></div>

  <main class="cart-page">
    <section class="cart-hero">
      <h1>Your Cart</h1>
      <p>Review your custom magnet order before checkout.</p>
    </section>

    <section class="cart-layout" id="cart-content"></section>
  </main>

  <div id="site-footer"></div>

  <script src="js/layout.js"></script>
  <script src="js/chatbot.js"></script>

  <script>
    const CART_KEY = "pandaCart";
    const cartContent = document.querySelector("#cart-content");

    function getCart() {
      return JSON.parse(localStorage.getItem(CART_KEY)) || [];
    }

    function saveCart(cart) {
      localStorage.setItem(CART_KEY, JSON.stringify(cart));
    }

    function updateQuantity(productId, newQuantity) {
      let cart = getCart();

      cart = cart.map(item => {
        if (item.id === productId) {
          return {
            ...item,
            quantity: newQuantity
          };
        }

        return item;
      });

      cart = cart.filter(item => item.quantity > 0);

      saveCart(cart);
      renderCart();
    }

    function removeItem(productId) {
      const cart = getCart().filter(item => item.id !== productId);
      saveCart(cart);
      renderCart();
    }

    function renderCart() {
      const cart = getCart();

      if (cart.length === 0) {
        cartContent.innerHTML = `
          <div class="empty-cart">
            <h2>Your cart is empty</h2>
            <p>Start by creating your first custom photo magnet.</p>
            <a href="magnets.html" class="btn">Browse Magnets</a>
          </div>
        `;
        return;
      }

      let subtotal = 0;

      const cartItemsHTML = cart.map(item => {
        const priceNumber = Number(item.price);
        const itemTotal = priceNumber * item.quantity;
        subtotal += itemTotal;

        return `
          <div class="cart-item">
            <img src="${item.image}" alt="${item.name}">

            <div>
              <h2>${item.name}</h2>
              <p>Price: $${priceNumber.toFixed(2)}</p>

              <div class="qty-controls">
                <button type="button" onclick="updateQuantity('${item.id}', ${item.quantity - 1})">−</button>
                <span>${item.quantity}</span>
                <button type="button" onclick="updateQuantity('${item.id}', ${item.quantity + 1})">+</button>
              </div>

              <button class="remove-btn" type="button" onclick="removeItem('${item.id}')">
                Remove
              </button>
            </div>

            <div class="cart-price">
              $${itemTotal.toFixed(2)}
            </div>
          </div>
        `;
      }).join("");

      cartContent.innerHTML = `
        <div class="cart-card">
          <div class="cart-list">
            ${cartItemsHTML}
          </div>
        </div>

        <aside class="cart-summary">
          <h2>Order Summary</h2>

          <div class="summary-row">
            <span>Items</span>
            <strong>${cart.length}</strong>
          </div>

          <div class="summary-row">
            <span>Subtotal</span>
            <strong>$${subtotal.toFixed(2)}</strong>
          </div>

          <div class="summary-row">
            <span>Shipping</span>
            <strong>Calculated later</strong>
          </div>

          <div class="summary-total">
            <span>Total</span>
            <span>$${subtotal.toFixed(2)}</span>
          </div>

          <a href="checkout.html?from=cart" class="btn">Continue to Checkout</a>
          <a href="magnets.html" class="btn">Add More</a>
        </aside>
      `;
    }

    renderCart();
  </script>
</body>
</html>
